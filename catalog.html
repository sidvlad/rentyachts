                    </li>
                    <li class="nav__item">

                    </li>
                    <li class="nav__item">
                        <a href="index.html#about" class="nav__link" data-i18n="nav.about">About</a>
                    </li>
                    <li class="nav__item">

                    <button class="lang-switcher__btn" data-lang="ru">RU</button>
                    <button class="lang-switcher__btn" data-lang="el">EL</button>
                </div>

                <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
                    <span class="menu-toggle__bar"></span>
                    <span class="menu-toggle__bar"></span>
                    <span class="menu-toggle__bar"></span>
                </button>
            </div>
        </div>

    <!-- Mobile Menu -->

            <span class="logo__text">ON THE SEA</span>

        <nav class="mobile-menu__nav">
            <a href="index.html" class="mobile-menu__link" data-i18n="nav.home">Home</a>
            <a href="catalog.html" class="mobile-menu__link active" data-i18n="nav.yachts">Yachts</a>
            <a href="index.html#services" class="mobile-menu__link" data-i18n="nav.services">Services</a>

            <a href="index.html#contact" class="mobile-menu__link" data-i18n="nav.contact">Contact</a>
        </nav>
        <div class="mobile-menu__lang">
            <button class="mobile-menu__lang-btn active" data-lang="en">EN</button>

        </div>
        <div class="mobile-menu__contact">

                <i class="fas fa-phone"></i>

                <i class="fab fa-whatsapp"></i>
                <span>WhatsApp</span>

        </div>
    </div>

    <!-- Main Content -->
    <main class="catalog">
        <div class="container">
            <!-- Page Header -->
            <div class="catalog__header">
                <h1 class="catalog__title" data-i18n="catalog.title">Yacht Catalog</h1>
            </div>

            <!-- Filters -->
            <div class="catalog__filters">
                <div class="catalog__filter-group">
                    <label class="catalog__filter-label" data-i18n="catalog.filter.guests">Guests</label>
                    <select class="catalog__filter-select" id="filterGuests">
                        <option value="" data-i18n="catalog.filter.all">All</option>
                        <option value="8">Up to 8</option>
                        <option value="10">Up to 10</option>
                        <option value="12">Up to 12</option>
                        <option value="14">14+</option>
                    </select>
                </div>
                <div class="catalog__filter-group">
                    <label class="catalog__filter-label" data-i18n="catalog.filter.price">Price</label>
                    <select class="catalog__filter-select" id="filterPrice">
                        <option value="" data-i18n="catalog.filter.all">All</option>
                        <option value="1500">&lt; €1500</option>
                        <option value="2500">€1500 - €2500</option>
                        <option value="3500">€2500 - €3500</option>
                        <option value="9999">&gt; €3500</option>
                    </select>
                </div>
                <div class="catalog__filter-group">
                    <label class="catalog__filter-label" data-i18n="catalog.sort.label">Sort by</label>
                    <select class="catalog__filter-select" id="sortBy">
                        <option value="featured">Featured</option>
                        <option value="priceLow" data-i18n="catalog.sort.priceLow">Price: Low to High</option>
                        <option value="priceHigh" data-i18n="catalog.sort.priceHigh">Price: High to Low</option>
                        <option value="newest" data-i18n="catalog.sort.newest">Newest First</option>
                    </select>
                </div>
            </div>

            <!-- Yachts Grid -->
            <div class="catalog__grid" id="catalogGrid">
                <!-- Yachts will be rendered by JavaScript -->
            </div>

            <!-- No Results Message -->
            <div class="catalog__no-results" id="noResults" style="display: none;">
                <i class="fas fa-ship"></i>
                <p data-i18n="catalog.noResults">No yachts found matching your criteria</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer footer--teal">
        <div class="footer__row">
            <nav class="footer__nav">
                <a href="index.html" data-i18n="nav.home">Главная</a>
                <a href="index.html#about" data-i18n="nav.about">О нас</a>
                <a href="catalog.html" data-i18n="nav.catalog">Каталог яхт</a>
                <a href="index.html#tours" data-i18n="nav.cruises">Круизы</a>
                <a href="index.html#services" data-i18n="nav.services">Услуги</a>
                <a href="#" data-i18n="nav.reviews">Отзывы</a>
                <a href="index.html#contact" data-i18n="nav.contact">Контакты</a>
            </nav>
            <div class="footer__brand">
                <svg class="footer__brand-icon" viewBox="0 0 60 60" fill="none">
                    <circle cx="30" cy="30" r="28" stroke="white" stroke-width="2"/>
                    <path d="M18 36 Q30 18 42 36" stroke="white" stroke-width="2" fill="none"/>
                    <path d="M24 34 L30 22 L36 34" stroke="white" stroke-width="1.5" fill="none"/>
                </svg>
                <span class="footer__brand-name">ON THE SEA</span>
            </div>
        </div>
    </footer>
