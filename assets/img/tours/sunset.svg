<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="sunset-sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="50%" style="stop-color:#F7C59F"/>
      <stop offset="100%" style="stop-color:#1A659E"/>
    </linearGradient>
    <linearGradient id="sunset-sea" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A659E"/>
      <stop offset="100%" style="stop-color:#004E89"/>
    </linearGradient>
  </defs>
  <rect fill="url(#sunset-sky)" width="800" height="260"/>
  <rect fill="url(#sunset-sea)" y="260" width="800" height="140"/>
  <!-- Sun -->
  <circle cx="400" cy="250" r="60" fill="#FFD93D"/>
  <circle cx="400" cy="250" r="70" fill="none" stroke="#FFD93D" stroke-width="10" opacity="0.3"/>
  <!-- Sun reflection -->
  <path d="M350 280 Q400 300 450 280 L450 400 L350 400 Z" fill="#FFD93D" opacity="0.2"/>
  <!-- Sailboat silhouette -->
  <path d="M150 260 L220 260 L235 280 L135 280 Z" fill="#2D3E50"/>
  <path d="M175 260 L175 180 L220 240 L175 240 Z" fill="#2D3E50"/>
  <!-- People silhouettes -->
  <circle cx="580" cy="240" r="12" fill="#2D3E50"/>
  <path d="M570 252 L590 252 L585 280 L575 280 Z" fill="#2D3E50"/>
  <circle cx="620" cy="245" r="12" fill="#2D3E50"/>
  <path d="M610 257 L630 257 L625 280 L615 280 Z" fill="#2D3E50"/>
  <!-- ON THE SEA watermark -->
  <text x="650" y="380" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)">ON THE SEA</text>
</svg>
