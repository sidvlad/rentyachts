<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="sky1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="100%" style="stop-color:#E0F4F8"/>
    </linearGradient>
    <linearGradient id="water1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#059AA3"/>
      <stop offset="100%" style="stop-color:#048a92"/>
    </linearGradient>
  </defs>
  <rect fill="url(#sky1)" width="600" height="180"/>
  <rect fill="url(#water1)" y="180" width="600" height="120"/>
  <!-- Sailing yacht -->
  <path d="M200 180 L280 180 L300 200 L180 200 Z" fill="#fff"/>
  <path d="M240 180 L240 80 L320 160 L240 160 Z" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <path d="M240 180 L240 100 L180 160 L240 160 Z" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <line x1="240" y1="80" x2="240" y2="180" stroke="#666" stroke-width="2"/>
  <!-- Mountains -->
  <path d="M0 180 L80 120 L160 180 Z" fill="#9DB4C0" opacity="0.5"/>
  <path d="M100 180 L200 100 L300 180 Z" fill="#7A9AAD" opacity="0.4"/>
  <path d="M400 180 L500 130 L600 180 Z" fill="#9DB4C0" opacity="0.5"/>
  <!-- Waves -->
  <path d="M0 200 Q50 190 100 200 T200 200 T300 200 T400 200 T500 200 T600 200" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
</svg>
