<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="sky2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="100%" style="stop-color:#E0F4F8"/>
    </linearGradient>
    <linearGradient id="water2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#40E0D0"/>
      <stop offset="100%" style="stop-color:#00CED1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#sky2)" width="600" height="150"/>
  <rect fill="url(#water2)" y="150" width="600" height="150"/>
  <!-- Clear water effect -->
  <ellipse cx="300" cy="220" rx="200" ry="60" fill="rgba(255,255,255,0.2)"/>
  <!-- Motor yacht/catamaran -->
  <path d="M180 160 L420 160 L440 180 L160 180 Z" fill="#fff"/>
  <rect x="220" y="130" width="160" height="30" fill="#fff" rx="3"/>
  <rect x="240" y="110" width="120" height="25" fill="#f5f5f5" rx="3"/>
  <!-- Windows -->
  <rect x="250" y="135" width="20" height="15" fill="#87CEEB" rx="2"/>
  <rect x="280" y="135" width="20" height="15" fill="#87CEEB" rx="2"/>
  <rect x="310" y="135" width="20" height="15" fill="#87CEEB" rx="2"/>
  <rect x="340" y="135" width="20" height="15" fill="#87CEEB" rx="2"/>
  <!-- Waves -->
  <path d="M0 200 Q75 185 150 200 T300 200 T450 200 T600 200" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <path d="M0 230 Q75 220 150 230 T300 230 T450 230 T600 230" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
</svg>
